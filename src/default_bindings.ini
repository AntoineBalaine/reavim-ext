; SKIPPED (cannot be expressed in this INI/key notation):
;   global.command    "<V-1>".."<V-16>" = VrtlBtn1..16  — reavim virtual-button pseudo-keys (control surface), no 'V' modifier in our notation
;
; (Keys containing ; or # are written double-quoted — the ini parser keeps
; quoted spans out of comment detection and unescapes \" and \\.)
