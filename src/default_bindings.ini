; ReaVim default bindings (full port of reavim's extended_defaults set).
; To customize, copy to <REAPER resource dir>/Data/Perken/bindings.ini.
;
; Sections are context.action_type. Contexts: main, midi, global (global is
; merged underneath both; context entries win). Action types: command,
; track_motion, track_operator, track_selector, visual_track_command,
; timeline_motion, timeline_operator, timeline_selector, visual_timeline_command.
;
; Values: ActionName (registry) | numeric command id | _NAMED_COMMAND
;         | @builtin (insert/normal/off/clear) | +FolderLabel
; Keys: vim notation — j, G, gg, <C-d>, <M-x>, <esc>, <F5>, <vk=0xBA>
;
; Grammar: operators compose with motions/selectors (d2j removes the spanned
; tracks), counts prefix any counted action (3j), V/v enter visual modes.
;
; [whichkey] sets the feedback-window pagination keys (single key each,
; default PageDown / PageUp). These page the menu without disturbing a
; pending sequence; they only act when the arrange/MIDI editor has focus, so
; other windows (e.g. the action list) keep their own PageDown/PageUp.

[whichkey]
page_next = <pagedown>
page_prev = <pageup>

