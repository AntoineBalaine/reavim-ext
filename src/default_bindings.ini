; ReaVim default bindings (seed set — the full reavim port lands incrementally).
; To customize, copy to <REAPER resource dir>/perken/reavim-ext/bindings.ini.
;
; Sections are context.action_type. Contexts: main, midi, global (global is
; merged underneath both; context entries win). Action types: command,
; track_motion, track_operator, track_selector, visual_track_command,
; timeline_motion, timeline_operator, timeline_selector, visual_timeline_command.
;
; Values: ActionName (registry) | numeric command id | _NAMED_COMMAND
;         | @builtin (insert/normal/off/clear) | +FolderLabel
; Keys: vim notation — j, G, gg, <C-d>, <M-x>, <esc>, <F5>, <vk=0xBA>
;
; Grammar: operators compose with motions/selectors (d2j removes the spanned
; tracks), counts prefix any counted action (3j), V/v enter visual modes.

[main.track_motion]
j = NextTrack
k = PrevTrack

[main.track_operator]
d = RemoveTracks

[main.timeline_motion]
w = NextMeasure
b = PrevMeasure

[main.timeline_operator]
s = SelectItems

[main.command]
o = InsertTrack
zz = ScrollTrackIntoView
V = SetModeVisualTrack
z = +view

[main.visual_track_command]
V = SetModeNormal

[global.command]
u = Undo
<C-r> = Redo
i = @insert
ZZ = @off
v = SetModeVisualTimeline
Z = +vim

[global.visual_timeline_command]
v = SetModeNormal
o = SwitchTimelineSelectionSide

[midi.command]
; midi-editor-specific bindings go here (raw ids dispatch via the MIDI editor)
