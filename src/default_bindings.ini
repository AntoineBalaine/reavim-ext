; ReaVim default bindings.
; To customize, copy this file to <REAPER resource dir>/perken/reavim-ext/bindings.ini
; (REAPER resource dir: Options -> Show REAPER resource path).
;
; Sections are context.mode: [main.normal], [midi.normal], plus [main.labels]
; for folder labels shown in completion hints.
; Values: numeric command id | _NAMED_COMMAND | @builtin (insert/normal/off/clear)
;         | anything else = stub (logs until ported)
; Keys: vim notation — j, G, gg, <C-d>, <M-x>, <esc>, <F5>, <vk=0xBA>
; Counts work: 3j moves three tracks.

[main.normal]
j = 40285        ; Track: go to next track
k = 40286        ; Track: go to previous track
o = 40001        ; Track: insert new track (below selected, vim-style "open line")
dd = 40005       ; Track: remove tracks
u = 40029        ; Edit: undo
<C-r> = 40030    ; Edit: redo
zz = 40913       ; Track: vertical scroll selected tracks into view
i = @insert
ZZ = @off

[main.labels]
d = delete
z = view
Z = vim

[midi.normal]
i = @insert
; midi-editor command ids go here (the id space differs from the main section)
